global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'xyncra-server'
    static_configs:
      - targets: ['xyncra-server:8080']
    metrics_path: '/metrics'
