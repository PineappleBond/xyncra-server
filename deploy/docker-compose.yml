services:
  xyncra-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    user: root
    ports:
      - "8080:8080"
      - "6060:6060"       # pprof (dev only)
    environment:
      - XYNCRA_ADDR=:8080
      - XYNCRA_REDIS_ADDR=redis:6379
      - XYNCRA_DB_DRIVER=sqlite
      - XYNCRA_DB_DSN=/data/xyncra.db
      - XYNCRA_TRACING_ENABLED=true
      - XYNCRA_TRACING_OTLP_ENDPOINT=jaeger:4317
      - XYNCRA_TRACING_OTLP_INSECURE=true
      - XYNCRA_TRACING_SAMPLING_RATE=1.0
      - XYNCRA_LOG_LEVEL=info
      - XYNCRA_LOG_DIR=/var/log/xyncra
      - XYNCRA_LOG_FORMAT=json
      - XYNCRA_METRICS_ENABLED=true
      - XYNCRA_PPROF_ENABLED=true
      - XYNCRA_PROFILING_ENABLED=true
      - XYNCRA_PROFILING_SERVER=http://pyroscope:4040
    volumes:
      - xyncra-data:/data
      - xyncra-logs:/var/log/xyncra
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    user: root
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "16686:16686"  # Jaeger UI
    environment:
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_KEY=/badger/data_keys
      - BADGER_DIRECTORY_VALUE=/badger/data
    volumes:
      - jaeger-badger:/badger
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Observability stack (enabled via --profile observability) ---

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ["observability"]
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    profiles: ["observability"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    # NOTE: grafana/loki:latest 是 distroless 镜像，无 /bin/sh 也无 wget/curl，
    # 无法在容器内执行健康检查。服务本身稳定，启动失败会在日志中立即报错。
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    profiles: ["observability"]
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - xyncra-logs:/var/log/xyncra:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  pyroscope:
    image: grafana/pyroscope:latest
    profiles: ["observability"]
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    # NOTE: grafana/pyroscope:latest 是 distroless 镜像，无 /bin/sh，无法执行容器内健康检查
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-pyroscope-datasource
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/xyncra-system-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    restart: unless-stopped

volumes:
  xyncra-data:
  redis-data:
  jaeger-badger:
  xyncra-logs:
  prometheus-data:
  loki-data:
  pyroscope-data:
  grafana-data:
