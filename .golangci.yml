version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  exclusions:
    paths:
      - demo/web/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused
          - staticcheck
          - govet
      - text: "SA4006"
        linters:
          - staticcheck
