name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.12'

jobs:
  # =============================================================================
  # Fast feedback jobs (PR + main)
  # =============================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
      - run: go vet ./...

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sequify
          POSTGRES_PASSWORD: sequify
          POSTGRES_DB: sequify
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sequify"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: sequify
          MYSQL_USER: sequify
          MYSQL_PASSWORD: sequify
          MYSQL_DATABASE: sequify
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: make test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile -t xyncra-server:${{ github.sha }} .

  # =============================================================================
  # CD job (main only)
  # =============================================================================

  push-to-ghcr:
    name: Push to GHCR
    needs: [lint, unit-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          docker build -f deploy/Dockerfile -t ghcr.io/${REPO_LOWER}:${SHA_SHORT} .
          docker push ghcr.io/${REPO_LOWER}:${SHA_SHORT}
