name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: '1.26'

jobs:
  # =============================================================================
  # Fast feedback jobs (PR + main)
  # =============================================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
      - run: go vet ./...

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: make test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t xyncra-server:${{ github.sha }} .

  # =============================================================================
  # E2E jobs (main only)
  # =============================================================================

  server-e2e:
    name: Server E2E
    needs: [lint, unit-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: docker compose -f docker-compose.e2e.yml up -d --wait
      - run: make test-e2e

  cli-e2e:
    name: CLI E2E
    needs: [lint, unit-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: make build-client
      - run: docker compose up -d --wait
      - run: make test-cli-e2e

  # =============================================================================
  # CD job (main only)
  # =============================================================================

  push-to-ghcr:
    name: Push to GHCR
    needs: [server-e2e, cli-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ghcr.io/${{ github.repository }}:${SHA_SHORT} .
          docker push ghcr.io/${{ github.repository }}:${SHA_SHORT}
