# E2E 测试专用 docker-compose
# 端口选择避免与本地开发环境冲突（D-043）：
#   Redis  16379 -> 6379
#   Server 18080 -> 8080

services:
  redis-e2e:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  xyncra-server-e2e:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.agent
      - .env.test
    ports:
      - "18080:8080"
    environment:
      - XYNCRA_ADDR=:8080
      - XYNCRA_REDIS_ADDR=redis-e2e:6379
      - XYNCRA_REDIS_DB=15
      - XYNCRA_DB_DRIVER=sqlite
      - XYNCRA_DB_DSN=/app/xyncra-e2e.db
    user: "root"
    depends_on:
      redis-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
